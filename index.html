<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Mystic Tarot - Deluxe Zodiac Edition</title>
    <style>
        :root { --gold: #ffd700; --purple: #2d0b5a; --dark: #0f051d; --text: #f0f0f0; }
        body { font-family: sans-serif; background: var(--dark); color: var(--text); margin: 0; padding: 15px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: #1a0836; padding: 30px; border-radius: 25px; border: 2px solid var(--gold); max-width: 500px; width: 100%; text-align: center; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        .input-group { text-align: left; margin-bottom: 15px; }
        label { color: var(--gold); display: block; margin-bottom: 8px; font-weight: bold; }
        select, input, textarea { width: 100%; padding: 14px; border-radius: 10px; border: 1.5px solid var(--gold); background: #0f051d; color: white; box-sizing: border-box; font-size: 1em; }
        .yellow-btn { background: var(--gold); color: #000; padding: 18px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1.2em; margin-top: 15px; box-shadow: 0 5px 15px rgba(255,215,0,0.2); }
        .hidden { display: none !important; }
        .card-row { display: flex; justify-content: center; gap: 10px; margin: 25px 0; }
        .card { width: 100px; height: 170px; border: 2px solid var(--gold); border-radius: 12px; background: #311b92; cursor: pointer; position: relative; display: flex; align-items: center; justify-content: center; }
        .card img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; display: none; }
        .card.flipped img { display: block; }
        .card span { font-size: 2.5em; color: var(--gold); }
        .result-box { margin-top: 25px; padding: 25px; background: rgba(0,0,0,0.7); border-radius: 20px; text-align: left; border-top: 5px solid var(--gold); line-height: 1.9; }
    </style>
</head>
<body>
<div class="container">
    <div id="screen1">
        <h1 style="color: var(--gold);">🔮 AI Mystic Oracle</h1>
        <div class="input-group">
            <label>ဘာအကြောင်း သိချင်တာလဲ?</label>
            <select id="topic">
                <option value="Love">❤️ အချစ်ရေး (Relationship)</option>
                <option value="Money">💰 စီးပွားရေး (Finance)</option>
                <option value="Work">💼 အလုပ်အကိုင် (Career)</option>
                <option value="Work">💼 ပညာရေး (Education)</option>
            </select>
        </div>
        <div class="input-group">
            <label>မွေးသက္ကရာဇ် (Birthday)</label>
            <input type="date" id="dob">
        </div>
        <div class="input-group">
            <label>သိလိုသော မေးခွန်း (Question)</label>
            <textarea id="question" rows="2" placeholder="မေးခွန်းရေးပါ..."></textarea>
        </div>
        <button class="yellow-btn" onclick="startReading()">ကံကြမ္မာကို စစ်ဆေးမည်</button>
    </div>

    <div id="screen2" class="hidden">
        <h3 id="zodiac-info" style="color: var(--gold);"></h3>
        <p>ကတ် (၃) ကတ်ကို ရွေးချယ်ပါ</p>
        <div class="card-row">
            <div id="c1" class="card" onclick="pick(1)"><span>✨</span><img id="img1"></div>
            <div id="c2" class="card" onclick="pick(2)"><span>✨</span><img id="img2"></div>
            <div id="c3" class="card" onclick="pick(3)"><span>✨</span><img id="img3"></div>
        </div>
        <div id="output" class="result-box hidden"></div>
        <button id="reset" class="yellow-btn hidden" onclick="location.reload()">အစမှ ပြန်မေးမည်</button>
    </div>
</div>

<script>
    const tarotDB = [];
    const majors = ["The Fool", "The Magician", "High Priestess", "Empress", "Emperor", "Hierophant", "Lovers", "Chariot", "Strength", "Hermit", "Wheel", "Justice", "Hanged Man", "Death", "Temperance", "Devil", "Tower", "Star", "Moon", "Sun", "Judgement", "World"];
    const suits = ["Wands", "Cups", "Swords", "Pentacles"];
    majors.forEach((m, i) => {
        tarotDB.push({ n: m, u: 'https://raw.githubusercontent.com/htanmo/tarot-images/main/cards/m${i}.jpg', Love: m + " အရ အချစ်ရေးမှာ ကံကောင်းမှုတွေ ရလာပါလိမ့်မယ်။", Money: m + " က ငွေကြေးစီးဆင်းမှု ကောင်းမွန်တာကို ပြပါတယ်။", Work: m + " အရ အလုပ်အကိုင်မှာ နေရာသစ်ရပါမယ်။" });
    });
    suits.forEach(s => {
        for(let i=1; i<=14; i++) tarotDB.push({ n: i+" of "+s, u: https://raw.githubusercontent.com/htanmo/tarot-images/main/cards/${s.toLowerCase()}${i}.jpg, Love: s + " ကဒ်ကျလို့ အချစ်ရေးမှာ အဆင်ပြေပါမယ်။", Money: s + " က စီးပွားတိုးတက်မယ့် လက္ခဏာပါ။", Work: "လုပ်ငန်းခွင်မှာ ကြိုးစားမှု အောင်မြင်ပါမယ်။" });
    });

    let userZodiac = "";

    function startReading() {
        const d = document.getElementById('dob').value;
        if(!d) return alert("မွေးနေ့ ရွေးပေးပါဦးဗျာ။");
        
        const date = new Date(d);
        const m = date.getUTCMonth() + 1, dy = date.getUTCDate();
        if ((m==3 && dy>=21) || (m==4 && dy<=19)) userZodiac = "Aries";
        else if ((m==4 && dy>=20) || (m==5 && dy<=20)) userZodiac = "Taurus";
        else if ((m==5 && dy>=21) || (m==6 && dy<=20)) userZodiac = "Gemini";
        else if ((m==6 && dy>=21) || (m==7 && dy<=22)) userZodiac = "Cancer";
        else if ((m==7 && dy>=23) || (m==8 && dy<=22)) userZodiac = "Leo";
        else if ((m==8 && dy>=23) || (m==9 && dy<=22)) userZodiac = "Virgo";
        else if ((m==9 && dy>=23) || (m==10 && dy<=22)) userZodiac = "Libra";
        else if ((m==10 && dy>=23) || (m==11 && dy<=21)) userZodiac = "Scorpio";
        else if ((m==11 && dy>=22) || (m==12 && dy<=21)) userZodiac = "Sagittarius";
        else if ((m==12 && dy>=22) || (m==1 && dy<=19)) userZodiac = "Capricorn";
        else if ((m==1 && dy>=20) || (m==2 && dy<=18)) userZodiac = "Aquarius";
        else userZodiac = "Pisces";

        document.getElementById('zodiac-info').innerText = "✨ Your Zodiac: " + userZodiac;
        document.getElementById('screen1').classList.add('hidden');
        document.getElementById('screen2').classList.remove('hidden');
    }

    let picked = [];
    function pick(num) {
        const el = document.getElementById('c'+num);
        if(el.classList.contains('flipped') || picked.length >= 3) return;
        const seed = new Date(document.getElementById('dob').value).getTime() + (num * 10);
        const idx = Math.floor((Math.abs(Math.sin(seed)) * 1000) % 78);
        const card = tarotDB[idx];
        picked.push(card);
        document.getElementById('img'+num).src = card.u;
        el.classList.add('flipped');
        el.querySelector('span').classList.add('hidden');

        if(picked.length === 3) {
            let topic = document.getElementById('topic').value;
            let res = <b>🔮 AI Reading for ${userZodiac}</b><br><br>;
            picked.forEach((p, i) => {
                res += <b>${["Past","Present","Future"][i]}: ${p.n}</b><br>${p[topic]}<br><br>;
            });
            document.getElementById('output').innerHTML = res;
            document.getElementById('output').classList.remove('hidden');
            document.getElementById('reset').classList.remove('hidden');
        }
    }
</script>
</body>
</html>
